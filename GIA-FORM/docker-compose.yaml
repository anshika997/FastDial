services:
  db:
    image: mysql:8.0.40
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - gia-data2:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw
    networks:
      - app-network
  frontend:
    image: flutterflirtcom/gia-frontend:latest
    container_name: frontend
    restart: unless-stopped
    networks:
      - app-network
  web:
    image: flutterflirtcom/gia-backend:latest
    container_name: web
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live:/etc/letsencrypt/live
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive
      - /etc/letsencrypt/renewal:/etc/letsencrypt/renewal
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

volumes:
  gia-data2:

networks:
  app-network:
    driver: bridge
